# ═══════════════════════════════════════════════════════════════════════════
# API tests (require auth — will be skipped in CI without credentials)
# ═══════════════════════════════════════════════════════════════════════════

[[test]]
name = "whoami-api"
args = ["whoami"]
compare = ["exit_code", "stdout_json"]
json_ignore_fields = ["created_at", "profile_image_url"]
normalize = ["timestamps"]
tags = ["api", "auth-required"]
skip_reason = "Requires live API credentials"

[[test]]
name = "search-api"
args = ["search", "rust programming", "--max-results", "5"]
compare = ["exit_code", "stdout_json"]
json_ignore_fields = ["created_at", "id", "edit_history_tweet_ids", "newest_id", "oldest_id", "next_token"]
json_ignore_order = true
normalize = ["timestamps", "ids"]
tags = ["api", "auth-required"]
skip_reason = "Requires live API credentials"

[[test]]
name = "lookup-api"
args = ["lookup", "XDev"]
compare = ["exit_code", "stdout_json"]
json_ignore_fields = ["created_at", "profile_image_url"]
normalize = ["timestamps"]
tags = ["api", "auth-required"]
skip_reason = "Requires live API credentials"

