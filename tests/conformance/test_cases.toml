# Differential conformance test cases for xurl vs xurl-rs.
#
# Each [[test]] defines a command to run against both binaries.
# Fields:
#   name             — unique test identifier
#   args             — CLI arguments
#   compare          — what to compare: exit_code, stdout, stderr, stdout_json
#   normalize        — normalization pipeline: timestamps, ids, paths, all, help_text
#   expect_failure   — if true, both binaries should fail
#   stdout_contains  — check that port stdout contains this string
#   json_ignore_fields — fields to strip before JSON comparison
#   json_ignore_order  — ignore array ordering in JSON comparison
#   timeout_secs     — per-test timeout (default: 30)
#   skip_reason      — skip this test with explanation
#   tags             — labels for filtering (basic, api, auth, etc.)

# ═══════════════════════════════════════════════════════════════════════════
# Basic CLI tests (Level 0)
# ═══════════════════════════════════════════════════════════════════════════

[[test]]
name = "help-flag"
args = ["--help"]
compare = ["exit_code"]
stdout_contains = "xurl"
tags = ["basic", "help"]
# Help text format differs between Go cobra and Rust clap — only compare exit code

[[test]]
name = "version-subcommand"
args = ["version"]
compare = ["exit_code", "stdout"]
normalize = ["version_string"]
tags = ["basic", "version"]

[[test]]
name = "invalid-flag"
args = ["--definitely-not-a-real-flag"]
compare = ["exit_code"]
expect_failure = true
tags = ["basic", "error"]

[[test]]
name = "no-args"
args = []
compare = ["exit_code"]
expect_failure = true
tags = ["basic", "error"]

