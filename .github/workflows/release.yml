# Source repo release wrapper — calls the centralized reusable workflow.
#
# Pipeline: check-version -> build (5 targets) -> crates.io -> release (non-draft) ->
# homebrew bottle build -> bottles upload back to release assets -> finalize-release
# marks the release final.
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write

jobs:
  pipeline:
    uses: brettdavies/.github/.github/workflows/rust-release.yml@main
    with:
      crate: xurl-rs
      bin: xr
    secrets:
      CI_RELEASE_TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
