[package]
name = "xurl"
version = "0.1.0"
edition = "2024"
description = "Auth-enabled curl-like interface for the X API"
license = "MIT"

[dependencies]
# CLI
clap = { version = "4", features = ["derive", "string"] }
dialoguer = "0.11"

# HTTP
reqwest = { version = "0.12", features = ["json", "multipart", "blocking", "stream"] }
tokio = { version = "1", features = ["rt", "net", "macros", "sync", "time"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Auth
hmac = "0.12"
sha1 = "0.10"
sha2 = "0.10"
base64 = "0.22"
rand = "0.9"
url = "2"

# Terminal
colored = "3"

# Utilities
open = "5"
thiserror = "2"
anyhow = "1"
dirs = "6"
percent-encoding = "2"

[dev-dependencies]
tempfile = "3"
pretty_assertions = "1"
assert_cmd = "2"
predicates = "3"
